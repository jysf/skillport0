# guidance/signals.yaml
# The Signals registry — ONE typed ledger for EVERY kind of feedback, so
# nothing rots un-decided. Coding lessons already had a forcing function
# (reflect at ship → codify into AGENTS.md). This gives the SAME teeth to
# process/tooling feedback, product/usage signals, and risks. See docs/signals.md.
#
# Every signal MUST have:
#   - id:             stable kebab-case identifier
#   - type:           lesson | process-debt | product | risk
#   - summary:        one sentence
#   - evidence:       the specs/usage that raised it; for lessons, the N-count
#   - bar:            lessons only — 'N=3 same-outcome' | 'N=2 paired-opposing'
#                     (the codification bar); null for non-lessons
#   - status:         open | watch | accepted | rejected | codified | done | dropped
#   - disposition_at: stage-close | project-close   (which close owns the decision)
#   - first_flagged:  YYYY-MM-DD
#   - last_touched:   YYYY-MM-DD   (bump every time a close walks it — no silent carry)
#   - raised_by:      human | claude | <agent-id>
#   - notes:          optional — where it landed / defer-trigger / reject-reason
#
# Type → who dispositions it, and the terminal states it can reach:
#   lesson       → STAGE close.   open → watch (accumulating N) → codified | dropped.
#                  Graduates to `codified` ONLY once evidence meets the `bar`
#                  (N=3 same-outcome, or N=2 paired-opposing). This IS the WATCH
#                  ledger — promoted from prose-scattered-in-stage-files to one
#                  visible file, which is the cross-stage-visibility fix.
#   process-debt → PROJECT close. open → accepted (scheduled) | rejected | done | dropped.
#   product      → PROJECT close. a usage/dogfooding signal; feeds the NEXT project's framing.
#   risk         → revisited at each close; no auto-action (watch indefinitely).
#
# The ritual (FIRST_SESSION_PROMPTS.md Prompt 1d / 1e): at each close, walk every
# open/watch signal that close owns; each gets accept-and-schedule /
# reject-with-reason / defer-with-trigger, and `last_touched` bumped. NO silent carry.
#
# Browse with `just dash signals` (open count surfaces in `just dash`'s flags).
#
# The entries below are illustrative seeds (drawn from real dogfooding). Replace
# them with your own, or delete them and start empty.

signals:
  # --- lesson: at its bar, queued to codify at the owning stage's close -------
  - id: flag-default-explicitness
    type: lesson
    summary: "Specs name a flag's accepted values but not its default, so build guesses."
    evidence: "SPEC-026/028/029 (--format default left unstated) — N=3 same-outcome"
    bar: "N=3 same-outcome"
    status: watch
    disposition_at: stage-close
    first_flagged: 2026-05-20
    last_touched: 2026-07-18
    raised_by: claude
    notes: "At bar (N=3). Codify at the owning stage's close — spec template / Prompt 2b should require each flag's default, not just its accepted values. Do NOT codify mid-stage. [STAGE-003 close 2026-07-18: walked — this is a TEMPLATE SEED from another repo (SPEC-026/028/029 are not skillport specs); no skillport occurrence, so not codified here. Kept watch; a real PROJ-001 owner should either adopt it for the skillport spec template or drop it as non-native at project close.]"

  # --- process-debt: THE lever — re-flagged twice, still un-adopted -----------
  - id: lightweight-verify-lane
    type: process-debt
    summary: "A bounded lightweight-verify lane for chore/XS specs (no separate verify session)."
    evidence: "bragfile feedback round 1 (#2) + round 2 (§C) — re-flagged twice, un-adopted"
    bar: null
    status: open
    disposition_at: project-close
    first_flagged: 2026-04-20
    last_touched: 2026-06-12
    raised_by: claude
    notes: "Strict boundary if accepted: no constraint-touching code, no new command, no new storage method. Accept-and-schedule or reject-with-reason at project close — do not silently carry a third time."

  # --- process-debt: smaller, also un-adopted ---------------------------------
  - id: collapse-build-completion-and-reflection
    type: process-debt
    summary: "Build Completion and the build-phase reflection overlap; collapse into one section."
    evidence: "bragfile feedback round 1 (#5) + round 2 (§C) — still two overlapping sections"
    bar: null
    status: open
    disposition_at: project-close
    first_flagged: 2026-04-20
    last_touched: 2026-06-12
    raised_by: claude
    notes: null

  # --- product: usage signal that should shape the NEXT project's framing ------
  - id: context-coldread-cost
    type: product
    summary: "Cold-read context cost grows with corpus size (AGENTS.md 300+ lines, large specs)."
    evidence: "bragfile feedback round 1 (friction #6) + round 2 (§B2 — extract another sub-template)"
    bar: null
    status: open
    disposition_at: project-close
    first_flagged: 2026-04-20
    last_touched: 2026-06-12
    raised_by: claude
    notes: "Feed the next project's frame: budget a sub-template extraction / a stack gotchas-checklist companion to relieve cold-read cost."

  # --- risk: tracked, revisited each close, no auto-action ---------------------
  - id: solo-discipline-erosion
    type: risk
    summary: "Self-imposed discipline erodes silently under solo claude-only use (no team pressure)."
    evidence: "bragfile feedback round 1 + round 2 meta-observation"
    bar: null
    status: watch
    disposition_at: project-close
    first_flagged: 2026-04-20
    last_touched: 2026-06-12
    raised_by: claude
    notes: "No auto-action. Revisit at each project close: are the fresh-session, verify, and one-PR-per-spec habits still holding?"

  # --- process-debt: raised at SPEC-001 ship (2026-07-18) ----------------------
  - id: cost-metering-manual-sessions
    type: process-debt
    summary: "Build/verify run as manual interactive sessions bypass subagent metering, so tokens_total is unrecoverable and the cost gate can't pass honestly."
    evidence: "SPEC-001 ship — build + verify ran as separate hand-driven Claude Code sessions; no subagent_tokens Agent result existed and /cost was not recorded, so cost-audit had to grandfather the spec."
    bar: null
    status: accepted
    disposition_at: project-close
    first_flagged: 2026-07-18
    last_touched: 2026-07-18
    raised_by: claude
    notes: "RESOLVED IN PRACTICE at SPEC-002: the orchestrator now spawns build (Sonnet) and verify (Opus) as metered subagents and reads subagent_tokens from the Agent result → real cost recorded, no grandfather. Fix = keep running build/verify as subagents (not hand-driven windows). SPEC-001 stays grandfathered (its cycles predate this). Confirm the habit held at PROJ-001 close, then mark done."

  # --- lesson: raised at SPEC-001 ship (2026-07-18) ---------------------------
  - id: spec-pin-edge-cases
    type: lesson
    summary: "Pin tolerated edge-case behavior in the spec's Failing Tests at design time, rather than leaving it as a 'builder's call'."
    evidence: "N=1 (SPEC-001) — three foreseeable edge cases (empty fenced block -> Present-empty, Unclosed body, consumed fence-terminator newline) were left open, costing a build-time decision + a verify-time re-derivation."
    bar: "N=3 same-outcome"
    status: watch
    disposition_at: stage-close
    first_flagged: 2026-07-18
    last_touched: 2026-07-18
    raised_by: claude
    notes: "Watch across STAGE-001 specs. Concrete carry: lock empty-block -> Present-empty with a test and flag it where STAGE-002 designs frontmatter.missing. [STAGE-001 close 2026-07-18: walked, kept watch] [STAGE-002 close 2026-07-18: walked, kept watch — concrete carry (lock empty-Present frontmatter) was DONE in SPEC-004; no new occurrence in STAGE-002; still below N=3] [STAGE-003 close 2026-07-18: walked, kept watch — still N=1. SPEC-011 had a related but distinct friction (its Failing-Tests prose said the good-claude fixture was 0/0/0, contradicting its own Behavior table where an allowed-tools list stays as a downgraded info); build correctly deferred to the table. That's a 'proofread spec prose against the spec's own behavior table at design' issue, adjacent to but not the same as pinning edge-case behavior in Failing Tests — not counted as a new instance. Still below N=3.]"

  # --- lesson: raised at SPEC-002 verify (2026-07-18) -------------------------
  - id: walk-unreadable-dirs
    type: lesson
    summary: "The tree-walker surfaces an unreadable *file* as CollectionItem::Unreadable, but a permission-denied *directory* is dropped silently (read_dir Err) rather than reported."
    evidence: "N=1 (SPEC-002 verify probe) — chmod 000 on a subdir mid-walk: the walk continued and returned siblings (correct, never-abort), but the unreadable subtree vanished with no signal."
    bar: "N=3 same-outcome"
    status: codified
    disposition_at: stage-close
    first_flagged: 2026-07-18
    last_touched: 2026-07-18
    raised_by: claude
    notes: "RESOLVED at SPEC-007 (2026-07-18): a permission-denied subtree is now surfaced as a `dir.unreadable` warning (CollectionItem::UnreadableDir → Report::from_collection), so the walk never silently hides incomplete coverage. [STAGE-001 close: kept watch] [STAGE-002 close: implemented → codified]"

  # --- lesson: raised at SPEC-004 verify (2026-07-18) -------------------------
  - id: name-charset-ascii
    type: lesson
    summary: "name.charset uses is_alphanumeric() && !is_uppercase(), which accepts non-ASCII lowercase letters/digits (café, Arabic-Indic digits) — the open spec likely means ASCII [a-z0-9-]."
    evidence: "N=1 (SPEC-004 verify observation) — faithful port of initial_stuff/lint.rs, which the spec instructed to mirror; not covered by an AC/test."
    bar: "N=3 same-outcome"
    status: codified
    disposition_at: stage-close
    first_flagged: 2026-07-18
    last_touched: 2026-07-18
    raised_by: claude
    notes: "RESOLVED at SPEC-006 (2026-07-18): name.charset tightened to strict ASCII [a-z0-9-]. The broader pattern — 'faithful prototype port can carry the prototype's latent bugs; verify ported logic against the spec, not just the prototype' — is the lasting lesson; keep it in mind for any future prototype ports."

  # --- lesson: raised at SPEC-011 ship (2026-07-18) ---------------------------
  - id: verified-enum-transcribe-whole-table
    type: lesson
    summary: "When a spec encodes an enumeration derived from primary docs (e.g. a platform's recognized fields), transcribe the WHOLE source table into the spec first, then curate — don't hand-pick items while drafting prose."
    evidence: "N=1 (SPEC-011) — design cited 8 of Claude's 13 documented frontmatter fields for CLAUDE_KEYS; verify caught the 5 omitted (when_to_use, argument-hint, agent, paths, shell). Nothing false was encoded (DEC-002 held), but the value promise ('a real Claude skill isn't flagged unknown') was only partly met until SPEC-012 completed it."
    bar: "N=3 same-outcome"
    status: watch
    disposition_at: stage-close
    first_flagged: 2026-07-18
    last_touched: 2026-07-18
    raised_by: claude
    notes: "RESOLVED for the instance at SPEC-012 (CLAUDE_KEYS completed to 13). Keep watch as a general design habit for any future doc-derived enumeration (e.g. a second --target). Below N=3. [STAGE-003 close 2026-07-18: recorded + walked, kept watch]"

  # --- lesson: raised at SPEC-012 ship (2026-07-18) ---------------------------
  - id: docs-drift-as-a-test
    type: lesson
    summary: "When docs assert a fact ABOUT code (a rule table, a flag list, a supported-values enumeration), back the assertion with a test that parses the doc and compares it to a single code-level source of truth — so staleness fails CI instead of shipping."
    evidence: "N=1 (SPEC-012) — the README rule-reference table is checked against the code RULES catalog by readme_rule_table_matches_catalog; verify confirmed it genuinely fails on divergence (not a tautology). Prompted by the pre-SPEC-012 README being badly stale (Status table stuck at SPEC-006)."
    bar: "N=3 same-outcome"
    status: watch
    disposition_at: stage-close
    first_flagged: 2026-07-18
    last_touched: 2026-07-18
    raised_by: claude
    notes: "Below N=3, not codified. Reusable beyond skillport: any doc-that-mirrors-code (CLI help, config reference) is a drift candidate. [STAGE-003 close 2026-07-18: recorded + walked, kept watch]"
