name: "skillport lint"
description: >-
  Lint agent Skill files (SKILL.md) against the open Agent Skills spec and
  upload findings to GitHub code-scanning as SARIF.
author: "jysf"

inputs:
  path:
    description: "Path to lint: a single SKILL.md, a skill folder, or a tree."
    required: false
    default: "."
  strict:
    description: "Treat warnings as failures (affects exit code only)."
    required: false
    default: "false"
  upload-sarif:
    description: "Upload the SARIF results to GitHub code-scanning."
    required: false
    default: "true"
  version:
    description: "Which skillport release to install (a version like \"0.1.0\", or \"latest\")."
    required: false
    default: "latest"

runs:
  using: "composite"
  steps:
    # SPEC-016: download the prebuilt release binary for the runner's
    # OS/arch (fast) instead of compiling from source on every run. Falls
    # back to a from-source build (below) when no release/asset exists yet
    # (pre-v0.1.0) or the platform is unsupported.
    - name: Install skillport (prebuilt)
      id: prebuilt
      shell: bash
      env:
        RUNNER_OS: ${{ runner.os }}
        RUNNER_ARCH: ${{ runner.arch }}
        VERSION: ${{ inputs.version }}
      run: "$GITHUB_ACTION_PATH/scripts/install-release.sh"

    - name: Ensure Rust toolchain (fallback)
      if: steps.prebuilt.outputs.installed != 'true'
      uses: dtolnay/rust-toolchain@stable

    # Fallback path — identical to today's behavior, kept so nothing
    # regresses for consumers before a release exists / on an unsupported
    # platform.
    - name: Install skillport from source (fallback)
      if: steps.prebuilt.outputs.installed != 'true'
      shell: bash
      run: cargo install --git https://github.com/jysf/skillport skillport --locked

    - name: Run skillport lint
      id: lint
      shell: bash
      run: |
        STRICT_FLAG=""
        if [ "${{ inputs.strict }}" = "true" ]; then
          STRICT_FLAG="--strict"
        fi
        # Do NOT swallow the exit code: a lint failure (or --strict warning)
        # must fail this step/job. The SARIF upload below runs regardless
        # (if: always()) so results still surface in code-scanning.
        skillport lint "${{ inputs.path }}" $STRICT_FLAG --sarif > skillport.sarif

    - name: Upload SARIF to code-scanning
      if: ${{ always() && inputs.upload-sarif == 'true' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: skillport.sarif
