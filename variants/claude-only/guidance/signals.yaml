# guidance/signals.yaml
# The Signals registry — ONE typed ledger for EVERY kind of feedback, so
# nothing rots un-decided. Coding lessons already had a forcing function
# (reflect at ship → codify into AGENTS.md). This gives the SAME teeth to
# process/tooling feedback, product/usage signals, and risks. See docs/signals.md.
#
# Every signal MUST have:
#   - id:             stable kebab-case identifier
#   - type:           lesson | process-debt | product | risk
#   - summary:        one sentence
#   - evidence:       the specs/usage that raised it; for lessons, the N-count
#   - bar:            lessons only — 'N=3 same-outcome' | 'N=2 paired-opposing'
#                     (the codification bar); null for non-lessons
#   - status:         open | watch | accepted | rejected | codified | done | dropped
#   - disposition_at: stage-close | project-close   (which close owns the decision)
#   - first_flagged:  YYYY-MM-DD
#   - last_touched:   YYYY-MM-DD   (bump every time a close walks it — no silent carry)
#   - raised_by:      human | claude | <agent-id>
#   - notes:          optional — where it landed / defer-trigger / reject-reason
#
# Type → who dispositions it, and the terminal states it can reach:
#   lesson       → STAGE close.   open → watch (accumulating N) → codified | dropped.
#                  Graduates to `codified` ONLY once evidence meets the `bar`
#                  (N=3 same-outcome, or N=2 paired-opposing). This IS the WATCH
#                  ledger — promoted from prose-scattered-in-stage-files to one
#                  visible file, which is the cross-stage-visibility fix.
#   process-debt → PROJECT close. open → accepted (scheduled) | rejected | done | dropped.
#   product      → PROJECT close. a usage/dogfooding signal; feeds the NEXT project's framing.
#   risk         → revisited at each close; no auto-action (watch indefinitely).
#
# The ritual (FIRST_SESSION_PROMPTS.md Prompt 1d / 1e): at each close, walk every
# open/watch signal that close owns; each gets accept-and-schedule /
# reject-with-reason / defer-with-trigger, and `last_touched` bumped. NO silent carry.
#
# Browse with `just dash signals` (open count surfaces in `just dash`'s flags).
#
# The entries below are illustrative seeds (drawn from real dogfooding). Replace
# them with your own, or delete them and start empty.

signals:
  # --- lesson: at its bar, queued to codify at the owning stage's close -------
  - id: flag-default-explicitness
    type: lesson
    summary: "Specs name a flag's accepted values but not its default, so build guesses."
    evidence: "SPEC-026/028/029 (--format default left unstated) — N=3 same-outcome"
    bar: "N=3 same-outcome"
    status: watch
    disposition_at: stage-close
    first_flagged: 2026-05-20
    last_touched: 2026-06-12
    raised_by: claude
    notes: "At bar (N=3). Codify at the owning stage's close — spec template / Prompt 2b should require each flag's default, not just its accepted values. Do NOT codify mid-stage."

  # --- process-debt: THE lever — re-flagged twice, still un-adopted -----------
  - id: lightweight-verify-lane
    type: process-debt
    summary: "A bounded lightweight-verify lane for chore/XS specs (no separate verify session)."
    evidence: "bragfile feedback round 1 (#2) + round 2 (§C) — re-flagged twice, un-adopted"
    bar: null
    status: open
    disposition_at: project-close
    first_flagged: 2026-04-20
    last_touched: 2026-06-12
    raised_by: claude
    notes: "Strict boundary if accepted: no constraint-touching code, no new command, no new storage method. Accept-and-schedule or reject-with-reason at project close — do not silently carry a third time."

  # --- process-debt: smaller, also un-adopted ---------------------------------
  - id: collapse-build-completion-and-reflection
    type: process-debt
    summary: "Build Completion and the build-phase reflection overlap; collapse into one section."
    evidence: "bragfile feedback round 1 (#5) + round 2 (§C) — still two overlapping sections"
    bar: null
    status: open
    disposition_at: project-close
    first_flagged: 2026-04-20
    last_touched: 2026-06-12
    raised_by: claude
    notes: null

  # --- product: usage signal that should shape the NEXT project's framing ------
  - id: context-coldread-cost
    type: product
    summary: "Cold-read context cost grows with corpus size (AGENTS.md 300+ lines, large specs)."
    evidence: "bragfile feedback round 1 (friction #6) + round 2 (§B2 — extract another sub-template)"
    bar: null
    status: open
    disposition_at: project-close
    first_flagged: 2026-04-20
    last_touched: 2026-06-12
    raised_by: claude
    notes: "Feed the next project's frame: budget a sub-template extraction / a stack gotchas-checklist companion to relieve cold-read cost."

  # --- risk: tracked, revisited each close, no auto-action ---------------------
  - id: solo-discipline-erosion
    type: risk
    summary: "Self-imposed discipline erodes silently under solo claude-only use (no team pressure)."
    evidence: "bragfile feedback round 1 + round 2 meta-observation"
    bar: null
    status: watch
    disposition_at: project-close
    first_flagged: 2026-04-20
    last_touched: 2026-06-12
    raised_by: claude
    notes: "No auto-action. Revisit at each project close: are the fresh-session, verify, and one-PR-per-spec habits still holding?"
